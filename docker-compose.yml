services:
  sma-sbfspot-runtime:
    image: ghcr.io/johannes667/sma-sbfspot-runtime:latest
    build: .
    container_name: SMA-SBFspot-Runtime
    network_mode: host
    privileged: true
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata/sma-sbfspot:/config
      - /mnt/user/appdata/sma-sbfspot/data:/data
      - /var/run/dbus:/var/run/dbus
    environment:
      CONFIG_DIR: "/config"
      DATA_DIR: "/data"
      APP_CONFIG_FILE: "/config/config.yaml"
      SBFSPOT_CFG: "/config/SBFspot.cfg"
