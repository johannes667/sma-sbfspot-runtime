services:
  sma-sbfspot-runtime:
    image: ghcr.io/johannes667/sma-sbfspot-runtime:2.2
    build: .
    container_name: SMA-SBFspot-Runtime
    network_mode: host
    privileged: true
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata/sma-sbfspot:/config
      - /mnt/user/appdata/sma-sbfspot/data:/data
      - /var/run/dbus:/var/run/dbus
    environment:
      INTERVAL: "300"
      WEB_PORT: "8088"
      MQTT_ENABLE: "true"
      MQTT_HOST: "192.168.2.115"
      MQTT_PORT: "1883"
      MQTT_USER: "sbfspot"
      MQTT_PASSWORD: ""
      MQTT_BASE_TOPIC: "sma/sbfspot"
      MQTT_RETAIN: "true"
      HA_DISCOVERY: "true"
      HA_DISCOVERY_PREFIX: "homeassistant"
      DEVICE_NAME: "SMA Wechselrichter Amann"
      DEVICE_ID: "sma_sbfspot_amann"
      FORECAST_ENABLE: "true"
      FORECAST_LATITUDE: "48.2173"
      FORECAST_LONGITUDE: "9.8268"
      FORECAST_DECLINATION: "35"
      FORECAST_AZIMUTH: "0"
      FORECAST_KWP: "3.6"
      FORECAST_INTERVAL: "3600"
      FORECAST_API_KEY: ""
      FORECAST_DAMPING: "0"
      FORECAST_INVERTER_KW: ""
      FORECAST_LEARNING_ENABLE: "true"
      FORECAST_LEARNING_DAYS: "14"
