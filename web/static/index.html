<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SMA Runtime 2.1.1</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>:root{color-scheme:dark}body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#101214;color:#eee;margin:0;padding:20px}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}h1{font-size:24px;margin:0}.badge{padding:6px 12px;border-radius:999px;background:#444;font-weight:700}.online{background:#136b35}.error{background:#8a2222}.waiting{background:#705f00}.config_missing{background:#8a5a20}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}.card{background:#1b1f23;border:1px solid #30363d;border-radius:16px;padding:16px;box-shadow:0 4px 18px #0006}.label{font-size:13px;color:#aab}.value{font-size:25px;font-weight:800;margin-top:6px;line-height:1.1}.chartbox{margin-top:18px;background:#1b1f23;border:1px solid #30363d;border-radius:16px;padding:16px}.small{font-size:13px;color:#9aa;margin-top:14px;word-break:break-word}canvas{max-height:280px}</style></head><body><div class="header"><h1>☀ SMA Live Werte</h1><div id="status" class="badge waiting">waiting</div></div><div class="grid"><div class="card"><div class="label">Leistung</div><div id="power_w" class="value">–</div></div><div class="card"><div class="label">Heute</div><div id="energy_today_kwh" class="value">–</div></div><div class="card"><div class="label">Gesamt</div><div id="energy_total_kwh" class="value">–</div></div><div class="card"><div class="label">Temperatur</div><div id="temperature_c" class="value">–</div></div><div class="card"><div class="label">MPPT1</div><div id="mppt1" class="value">–</div></div><div class="card"><div class="label">MPPT2</div><div id="mppt2" class="value">–</div></div><div class="card"><div class="label">AC L1</div><div id="ac1" class="value">–</div></div><div class="card"><div class="label">Frequenz</div><div id="frequency_hz" class="value">–</div></div><div class="card"><div class="label">Wirkungsgrad</div><div id="efficiency_percent" class="value">–</div></div></div><div class="chartbox"><canvas id="chart"></canvas></div><div class="small" id="timestamp"></div><div class="small" id="error"></div><script>const units={power_w:" W",energy_today_kwh:" kWh",energy_total_kwh:" kWh",temperature_c:" °C",frequency_hz:" Hz",efficiency_percent:" %"};function fmt(v,u=""){return(v===null||v===undefined)?"–":String(v).replace(".",",")+u}let chart;async function loadLive(){const r=await fetch('/api/live?_='+Date.now());const s=await r.json();const st=document.getElementById('status');st.textContent=s.status||'unknown';st.className='badge '+(s.status||'waiting');for(const k of["power_w","energy_today_kwh","energy_total_kwh","temperature_c","frequency_hz","efficiency_percent"]){document.getElementById(k).textContent=fmt(s[k],units[k])}document.getElementById('mppt1').textContent=`${fmt(s.pdc1_w," W")} / ${fmt(s.dc_voltage_1_v," V")} / ${fmt(s.dc_current_1_a," A")}`;document.getElementById('mppt2').textContent=`${fmt(s.pdc2_w," W")} / ${fmt(s.dc_voltage_2_v," V")} / ${fmt(s.dc_current_2_a," A")}`;document.getElementById('ac1').textContent=`${fmt(s.pac1_w," W")} / ${fmt(s.ac_voltage_1_v," V")} / ${fmt(s.ac_current_1_a," A")}`;document.getElementById('timestamp').textContent='Letzte Aktualisierung: '+(s.timestamp||'–');document.getElementById('error').textContent=s.last_error?'Fehler: '+s.last_error:''}async function loadHistory(){const r=await fetch('/api/history?_='+Date.now());const rows=await r.json();const labels=rows.map(x=>(x.ts||'').substring(11,16));const data=rows.map(x=>x.power_w);const ctx=document.getElementById('chart');if(!chart){chart=new Chart(ctx,{type:'line',data:{labels,datasets:[{label:'Leistung W',data,tension:.25}]},options:{responsive:true,scales:{y:{beginAtZero:true}}}})}else{chart.data.labels=labels;chart.data.datasets[0].data=data;chart.update()}}async function loop(){try{await loadLive();await loadHistory()}catch(e){console.log(e)}}loop();setInterval(loop,10000);</script></body></html>
