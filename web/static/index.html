<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SMA Runtime 2.1</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>body{font-family:system-ui;background:#101214;color:#eee;margin:0;padding:20px}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}h1{font-size:24px;margin:0}.badge{padding:6px 12px;border-radius:999px;background:#444;font-weight:700}.online{background:#136b35}.error{background:#8a2222}.waiting{background:#705f00}.config_missing{background:#8a5a20}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}.card,.chartbox{background:#1b1f23;border:1px solid #30363d;border-radius:16px;padding:16px;box-shadow:0 4px 18px #0006}.label{font-size:13px;color:#aab}.value{font-size:26px;font-weight:800;margin-top:6px}.small{font-size:13px;color:#9aa;margin-top:14px;word-break:break-word}.chartbox{margin-top:18px}canvas{max-height:280px}</style></head><body><div class="header"><h1>☀ SMA Live Werte</h1><div id="status" class="badge waiting">warte...</div></div><div class="grid"><div class="card"><div class="label">Leistung</div><div id="power_w" class="value">–</div></div><div class="card"><div class="label">Heute</div><div id="energy_today_kwh" class="value">–</div></div><div class="card"><div class="label">Gesamt</div><div id="energy_total_kwh" class="value">–</div></div><div class="card"><div class="label">Temperatur</div><div id="temperature_c" class="value">–</div></div><div class="card"><div class="label">MPPT1</div><div id="mppt1" class="value">–</div></div><div class="card"><div class="label">MPPT2</div><div id="mppt2" class="value">–</div></div><div class="card"><div class="label">AC L1</div><div id="ac1" class="value">–</div></div><div class="card"><div class="label">Frequenz</div><div id="frequency_hz" class="value">–</div></div><div class="card"><div class="label">Wirkungsgrad</div><div id="efficiency_percent" class="value">–</div></div></div><div class="chartbox"><canvas id="chart"></canvas></div><div class="small" id="timestamp"></div><div class="small" id="error"></div><script>const u={power_w:' W',energy_today_kwh:' kWh',energy_total_kwh:' kWh',temperature_c:' °C',frequency_hz:' Hz',efficiency_percent:' %'};function f(v,x=''){return v===null||v===undefined?'–':v+x}let c;async function live(){let s=await(await fetch('/api/live?_='+Date.now())).json();let st=document.getElementById('status');st.textContent=s.status||'unknown';st.className='badge '+(s.status||'waiting');['power_w','energy_today_kwh','energy_total_kwh','temperature_c','frequency_hz','efficiency_percent'].forEach(k=>document.getElementById(k).textContent=f(s[k],u[k]));document.getElementById('mppt1').textContent=`${f(s.pdc1_w,' W')} / ${f(s.dc_voltage_1_v,' V')} / ${f(s.dc_current_1_a,' A')}`;document.getElementById('mppt2').textContent=`${f(s.pdc2_w,' W')} / ${f(s.dc_voltage_2_v,' V')} / ${f(s.dc_current_2_a,' A')}`;document.getElementById('ac1').textContent=`${f(s.pac1_w,' W')} / ${f(s.ac_voltage_1_v,' V')} / ${f(s.ac_current_1_a,' A')}`;document.getElementById('timestamp').textContent='Letzte Aktualisierung: '+(s.timestamp||'–');document.getElementById('error').textContent=s.last_error?'Fehler: '+s.last_error:''}async function hist(){let r=await(await fetch('/api/history?_='+Date.now())).json();let labels=r.map(x=>(x.ts||'').substring(11,16)),data=r.map(x=>x.power_w);let ctx=document.getElementById('chart');if(!c){c=new Chart(ctx,{type:'line',data:{labels,datasets:[{label:'Leistung W',data,tension:.25}]},options:{responsive:true,scales:{y:{beginAtZero:true}}}})}else{c.data.labels=labels;c.data.datasets[0].data=data;c.update()}}async function loop(){try{await live();await hist()}catch(e){console.log(e)}}loop();setInterval(loop,10000)</script></body></html>
