<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SMA Runtime 2.3.0</title>
  <style>
    :root{--bg:#0f172a;--card:#1f2937;--card2:#111827;--line:#374151;--text:#e5e7eb;--muted:#9ca3af;--green:#22c55e;--yellow:#facc15;--red:#ef4444;--blue:#38bdf8}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:22px}h1{font-size:24px;margin:0 0 6px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.status{color:var(--muted);margin-bottom:18px}.tabs{display:flex;gap:8px;margin:14px 0 18px;flex-wrap:wrap}.tab{background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:999px;padding:9px 13px;cursor:pointer}.tab.active{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue) inset}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px}.label{color:var(--muted);font-size:15px}.value{font-size:34px;font-weight:800;margin-top:8px}.wide{grid-column:1/-1}canvas{width:100%;height:330px;background:var(--card2);border-radius:10px}.small{color:#cbd5e1;font-size:14px;line-height:1.5}.legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:10px}.dot{display:inline-block;width:18px;height:4px;border-radius:4px;margin-right:6px;vertical-align:middle}.green{background:var(--green)}.yellow{background:var(--yellow)}.service{display:grid;grid-template-columns:34px 1fr auto;gap:10px;align-items:center;border-top:1px solid var(--line);padding:12px 0}.service:first-child{border-top:0}.lamp{width:16px;height:16px;border-radius:50%;display:inline-block}.ok{background:var(--green)}.warn{background:var(--yellow)}.error{background:var(--red)}.disabled{background:#64748b}.badge{border:1px solid var(--line);border-radius:999px;padding:4px 9px;color:#cbd5e1;font-size:13px}.hidden{display:none}.btn{background:#0b1220;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:9px 11px;cursor:pointer;text-decoration:none;display:inline-block}.logbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.log{background:#020617;border:1px solid var(--line);border-radius:14px;padding:12px;white-space:pre-wrap;overflow:auto;max-height:560px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.45}.li{display:block}.INFO{color:#cbd5e1}.WARNING,.WARN{color:#fde68a}.ERROR{color:#fecaca}.muted{color:var(--muted)}@media(max-width:700px){.grid{grid-template-columns:1fr}.value{font-size:30px}.service{grid-template-columns:28px 1fr}.service .badge{grid-column:2}}
  </style>
</head>
<body>
<div class="top"><div><h1>☀ SMA Runtime</h1><div id="status" class="status">waiting</div></div><div class="badge" id="version">v–</div></div>
<div class="tabs"><button class="tab active" data-view="dashboard">Dashboard</button><button class="tab" data-view="services">Status</button><button class="tab" data-view="logs">Logs</button></div>

<section id="dashboard" class="view">
<div class="grid">
  <div class="card"><div class="label">Leistung</div><div class="value" id="power">–</div></div>
  <div class="card"><div class="label">Forecast jetzt</div><div class="value" id="forecast">–</div></div>
  <div class="card"><div class="label">Heute</div><div class="value" id="today">–</div></div>
  <div class="card"><div class="label">Forecast Heute</div><div class="value" id="ftoday">–</div></div>
  <div class="card"><div class="label">Temperatur</div><div class="value" id="temp">–</div></div>
  <div class="card"><div class="label">DC Gesamt</div><div class="value" id="dc">–</div></div>
  <div class="card"><div class="label">MPPT1</div><div class="value" id="mppt1">–</div></div>
  <div class="card"><div class="label">MPPT2</div><div class="value" id="mppt2">–</div></div>
  <div class="card"><div class="label">Wirkungsgrad</div><div class="value" id="eff">–</div></div>
  <div class="card"><div class="label">Uptime</div><div class="value" id="uptime">–</div></div>
  <div class="card wide"><div class="label">Verlauf: PV Ist-Leistung + Forecast.Solar (persistente Tageshistorie)</div><br><canvas id="chart" width="900" height="360"></canvas><div class="legend"><span><span class="dot green"></span>Real</span><span><span class="dot yellow"></span>Forecast</span></div><p class="small" id="forecastInfo">–</p></div>
</div>
</section>

<section id="services" class="view hidden"><div class="card wide"><h2>❤️ Dienststatus</h2><div id="serviceList">–</div></div></section>
<section id="logs" class="view hidden"><div class="card wide"><h2>📋 Live-Log</h2><div class="logbar"><button class="btn" onclick="loadLog()">Aktualisieren</button><a class="btn" href="/api/log/download">Log herunterladen</a><button class="btn" onclick="clearLog()">Log leeren</button></div><div id="log" class="log">–</div></div></section>

<script>
const $=id=>document.getElementById(id);let active='dashboard';
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{active=b.dataset.view;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b));document.querySelectorAll('.view').forEach(v=>v.classList.toggle('hidden',v.id!==active)); if(active==='logs')loadLog(); if(active==='services')loadServices();});
function fmt(v,u,d=0){ if(v===undefined||v===null||v==='') return '–'; let n=Number(v); if(Number.isNaN(n)) return v; return n.toFixed(d)+' '+u; }
function dur(sec){ if(sec===undefined||sec===null)return'–'; sec=Number(sec); const d=Math.floor(sec/86400),h=Math.floor(sec%86400/3600),m=Math.floor(sec%3600/60); return (d?d+' Tage ':'')+h+' Std '+m+' Min'; }
function parseLocalTs(ts){ if(!ts)return null; if(String(ts).includes('T'))return new Date(ts); const m=String(ts).match(/^(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2}):(\d{2})$/); if(m)return new Date(+m[1],+m[2]-1,+m[3],+m[4],+m[5],+m[6]); return new Date(ts); }
function tsHour(ts){ const d=parseLocalTs(ts); return d ? d.getHours()+d.getMinutes()/60+d.getSeconds()/3600 : 0; }
function todayIso(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function forecastPoints(forecast){ const watts=forecast.watts_corrected||forecast.watts||{},day=todayIso(); return Object.entries(watts).filter(([ts])=>String(ts).startsWith(day)).map(([ts,v])=>({x:tsHour(ts),f:Number(v||0)})); }
function draw(hist,forecast){ const c=$('chart'),ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height); const pad=48,w=c.width-pad-14,h=c.height-pad-22; const real=hist.filter(x=>x.ts).map(x=>({x:tsHour(x.ts),y:Number(x.power_w||0)})); const fc=forecastPoints(forecast||{}); const max=Math.max(1000,...real.map(p=>p.y),...fc.map(p=>p.f)); ctx.strokeStyle='#334155'; ctx.lineWidth=1; ctx.font='12px sans-serif'; ctx.fillStyle='#94a3b8'; for(let i=0;i<=4;i++){let y=10+h-i*h/4;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(pad+w,y);ctx.stroke();ctx.fillText(Math.round(max*i/4)+' W',4,y+4)} for(let hr=0;hr<=24;hr+=4){let x=pad+w*hr/24;ctx.beginPath();ctx.moveTo(x,10);ctx.lineTo(x,10+h);ctx.stroke();ctx.fillText(hr+':00',x-12,10+h+24)} function line(arr,key,color,dash){ctx.strokeStyle=color;ctx.lineWidth=3;ctx.setLineDash(dash||[]);ctx.beginPath();let first=true;for(const p of arr){let x=pad+w*p.x/24,y=10+h-(p[key]/max)*h;if(first){ctx.moveTo(x,y);first=false}else ctx.lineTo(x,y)}ctx.stroke();ctx.setLineDash([])} line(fc,'f','#facc15',[8,6]); line(real,'y','#22c55e',[]); }
async function load(){ const s=await fetch('/api/state').then(r=>r.json()); const h=await fetch('/api/history?mode=day').then(r=>r.json()); const f=await fetch('/api/forecast').then(r=>r.json()).catch(()=>({})); const sv=await fetch('/api/services').then(r=>r.json()).catch(()=>({})); $('version').textContent='v'+(sv.version||'–'); $('uptime').textContent=dur(sv.uptime_seconds); $('status').textContent=(s.status||'waiting')+' · '+(s.timestamp||''); $('power').textContent=fmt(s.power_w,'W'); $('forecast').textContent=fmt(s.forecast_power_w,'W'); $('today').textContent=fmt(s.energy_today_kwh,'kWh',2); $('ftoday').textContent=fmt(s.forecast_today_kwh,'kWh',2); $('temp').textContent=fmt(s.temperature_c,'°C',1); $('dc').textContent=fmt(s.pdc_total_w,'W'); $('mppt1').textContent=fmt(s.pdc1_w,'W'); $('mppt2').textContent=fmt(s.pdc2_w,'W'); $('eff').textContent=fmt(s.efficiency_percent,'%',2); const arrays=(f.arrays||[]).map(a=>`${a.name}: ${a.peak_power} kWp, ${a.declination}°, ${a.azimuth}°`).join(' · '); const errors=(f.errors||[]).length?' · Fehler: '+f.errors.join(' | '):''; $('forecastInfo').textContent='Forecast: '+(s.forecast_updated_at||f.updated_at||'–')+' · Faktor: '+(s.forecast_learning_factor||f.learning_factor||1)+' · Lerntage: '+(s.forecast_learning_days||f.learning_days||0)+(arrays?' · '+arrays:'')+errors; draw(h,f); if(active==='services')renderServices(sv); }
function renderServices(sv){ $('serviceList').innerHTML=(sv.services||[]).map(x=>`<div class="service"><span class="lamp ${x.status}"></span><div><b>${x.name}</b><div class="muted">${x.detail||''}</div></div><span class="badge">${x.last_ok||'–'}</span></div>`).join(''); }
async function loadServices(){ const sv=await fetch('/api/services').then(r=>r.json()); renderServices(sv); }
async function loadLog(){ const l=await fetch('/api/log?limit=500').then(r=>r.json()); $('log').innerHTML=(l.lines||[]).map(line=>{let cls=(line.match(/\[(INFO|WARNING|WARN|ERROR)\]/)||[])[1]||'INFO'; return `<span class="li ${cls}">${line.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}</span>`}).join(''); $('log').scrollTop=$('log').scrollHeight; }
async function clearLog(){ await fetch('/api/log/clear',{method:'POST'}); loadLog(); }
load(); setInterval(load,30000); setInterval(()=>{if(active==='logs')loadLog()},10000);
</script>
</body>
</html>
